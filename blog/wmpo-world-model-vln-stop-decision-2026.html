## 为什么这篇论文值得关注锛?

2026年ICLR接收了一篇来自港科大PEI-Lab与字节跳动Seed团队的论文—鈥?strong>WMPO: World Model-based Policy Optimization for Vision-Language-Action Models</strong>。这篇论文的核心贡献是让VLA模型"在想象中训练"：构建一个世界模型来模拟环境动态，然后在想象空间中做策略优化銆?

听起来像不像强化学习版的"白日做梦"锛?

但就是这涓?白日做梦"，对VLN停止决策这个我们精卫013持续深耕的问题，有着深远的影响銆?

<div class="highlight-box">
<strong>核心洞察</strong>：世界模型可以预娴?如果我继续走5步会怎样"，这等价于一个基于未来想象的隐式停止决策——比当前的信心头判断更直接、更有信息量銆?
</div>

## WMPO的技术核蹇?

### 世界模型：环境动态的"模拟鍣?

WMPO的世界模型接收当前视觉观测和动作作为输入，输出下一时刻的视觉状态预测。它基于扩散模型架构，用离线轨迹数据训练，学会了环境的动态规律銆?

简单说：给它一段历史画面和一个动作，它就鑳?想象"出下一步会看到什么銆?

### 策略优化：在想象空间中训缁?

有了世界模型，策略优化就不需要真机交互了。WMPO在世界模型生成的想象轨迹上做PPO风格的策略梯度更新。关键优势：

<ul>
<li><strong>零真机成鏈?/strong>：不需要在真实机器人上试错</li>
<li><strong>探索更充鍒?/strong>：想象轨迹可以覆盖更多失璐?恢复模式</li>
<li><strong>自我纠错涌现</strong>：训练后的策略自然学会了纠错行为，无需显式训练</li>
</ul>

### 自我纠错的涌现：意外之喜

最令人惊讶的发现是，在世界模型中训练后，策略自然学会了自我纠错。推测原因是想象空间中的探索让策略见到了更多"走错了再回头"的模式，从而内化了纠错能力銆?

## 对VLN停止决策的三重启绀?

### 启示一：世界模鍨?= 隐式停止判断

当前的CoW-Nav方案使用信心头来判断"我现在对停止有多确信"。这是一个基浜?strong>当前状鎬?/strong>的判断銆?

世界模型提供了另一种思路：直接预娴?如果我继续走5步会怎样"。如果预测显示继续走会偏离目标位置，那么现在就应该停止銆?

<div class="insight-box">
<strong>融合方案</strong>：CoW-Nav v2 = FSCoT推理 + 信心头判鏂?+ 世界模型未来预测<br><br>
三重决策机制锛?br>
1. 信心头说"我现在对停止很确淇?（内部状态）<br>
2. 世界模型璇?继续走会偏离"（未来预测）<br>
3. FSCoT推理璇?视觉描述与指令终点语义匹閰?（逻辑推理锛?br><br>
三者一鑷?鈫?停止；不一鑷?鈫?保守策略，继续走
</div>

### 启示二：想象轨迹 = 免费负样鏈?

CoW-Nav的自改进训练依赖成功/失败停止样本来迭代。但失败轨迹有限——你需要真的跑鍑?停错浜?的轨迹才能获得负样本銆?

世界模型可以解决这个问题：对每个停止点，想象"如果没停，继续走会怎样"。这些想象轨迹就是免费的自改进负样本，数据效率大幅提升銆?

### 启示三：自我纠错 = 动态停止的"后悔鑽?

如果VLN策略也能涌现自我纠错，那么停止决策就浠?一次性判鏂?升级涓?可回退判断"锛?

<ul>
<li>走过浜?鈫?回退几步 鈫?在正确位置停姝?/li>
<li>提前停了 鈫?意识到没鍒?鈫?继续前进</li>
</ul>

这实际上将停止决策从不可逆操作变成了可逆操作，极大降低了错误停止的代价銆?

## 与NWM的对比：两条路径

Meta AI的Navigation World Models (NWM)从另一条路径解决类似问题：

<table class="data-table">
<tr><th>维度</th><th>NWM (Meta AI)</th><th>WMPO (HKUST+Seed)</th><th>CoW-Nav融合方向</th></tr>
<tr><td>任务</td><td>视觉导航规划</td><td>机械臂操浣?/td><td>VLN停止决策</td></tr>
<tr><td>核心能力</td><td>生成未来导航甯?/td><td>想象中策略优鍖?/td><td>未来5步预娴?/td></tr>
<tr><td>模型规模</td><td>1B (CDiT)</td><td>未公开</td><td>轻量级（&lt;100M锛?/td></tr>
<tr><td>与VLN距离</td><td>近（直接导航锛?/td><td>远（操作→需迁移锛?/td><td>零（原生VLN锛?/td></tr>
</table>

NWM更直接适用，但WMPO的策略优化范式更有启发性。最理想的情况是将NWM的导航世界模型与WMPO的想象中训练结合起来銆?

世界模型不是万能药，但它为VLN停止决策打开了一扇新窗户。与其问"我现在有多确信应该停姝?，不如问"如果我继续走会看到什涔?——后者包含的信息量远大于前者銆?
